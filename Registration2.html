<html>
<head> <title>Registration</title> </head>

<body>
    <h1>Registration</h1>
    <table cellspacing="5">
        <tr>
            <td>
                <fieldset>
                    <legend><b>General Information:</b></legend>
                    <table cellpadding="8">

                       <tr>
                            <td><b>First <br> Name</b></td>
                            <td>: <input type="text"></td>
                      </tr>

                        <tr>
                            <td><b>Last <br> Name</b></td>
                            <td>: <input type="text"></td>
                        </tr>

                        <tr>
                            <td><b>Gender</b></td>
                            <td>:
                                <input type="radio" name="gender">Male
                                <input type="radio" name="gender">Female
                            </td>
                        </tr>

                        <tr>
                            <td><b>Father's<br> Name</b></td>
                            <td>:
                                <input type="text">
                                <input type="file">
                            </td>
                        </tr>

                        <tr>
                            <td><b>Mother's <br> Name</b></td>
                            <td>: <input type="text"></td>
                        </tr>

                        <tr>
                            <td><b>Blood <br> Group</b></td>
                            <td>:
                                <select>
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <td><b>Religion</b></td>
                            <td>:
                                <select>
                                    <option>Islam</option>
                                    <option>Hinduism</option>
                                    <option>Christianity</option>
                                    <option>Buddhism</option>
                                </select>
                            </td>
                        </tr>

                    </table>
                </fieldset>
            </td>

      
            <td>
                <fieldset>
                    <legend><b>Contact Information:</b></legend>
                    <table cellpadding="8">

                        <tr>
                            <td><b>Email</b></td>
                            <td>: <input type="email"></td>
                        </tr>

                        <tr>
                            <td><b>Phone/Mobile</b></td>
                            <td>: <input type="text"></td>
                        </tr>

                        <tr>
                            <td><b>Website</b></td>
                            <td>: <input type="url"></td>
                        </tr>

                        <tr>
                            <td><b>Address</b></td>
                            <td>

                                <fieldset>
                                    <legend>Present Address</legend>

                                    <select>
                                        <option>Bangladesh</option>
                                        <option>Bhutan</option>
                                        <option>Nepal</option>
                                    </select>

                                    <select>
                                        <option>Dhaka</option>
                                        <option>Sylhet</option>
                                        <option>Rangpur</option>
                                        <option>Khulna</option>
                                    </select>

                                    <br><br>

                                    <textarea rows="5" cols="22"placeholder="Road/Street/City"></textarea>

                                    <br><br>
                                    <input type="text" placeholder="Post Code">

                                </fieldset>
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </td>
 
            <td>

                <fieldset>
                    <legend><b>Account Information: </b></legend>
                    <table cellpadding="12">
                        <tr>
                            <td><b>Username</b></td>
                            <td>: <input type="text"></td>
                        </tr>
                        
                        <tr>
                            <td><b>Password</b></td>
                            <td>: <input type="password"></td>
                        </tr>

                        <tr>
                            <td><b>Confirm Password </b></td>
                            <td> : <input type="password"></td>
                        </tr>

                    </table>

                </fieldset>
                <br>

                <input type="submit" value="Register">

            </td>
        </tr>
    </table>
</body>
</html>
